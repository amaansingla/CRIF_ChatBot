<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>CRIF Admin Panel</title>
  </head>

  <body>
    <!-- LOGIN SCREEN -->
    <div id="login">
      <h1>CRIF Admin Panel</h1>
      <button onclick="goBack()">⬅ Back to Chat</button>

      <p>Enter admin password to continue</p>

      <input
        id="admin-pass"
        type="password"
        placeholder="Password = crifadmin"
      />
      <br /><br />
      <button onclick="checkPassword()">Login</button>

      <p id="login-error" style="color: red"></p>
    </div>

    <!-- ADMIN CONTENT -->
    <div id="admin" style="display: none">
      <button onclick="goBack()">⬅ Back to Chat</button>
      <button id="logoutBtn" class="ghost">Logout</button>

      <h1>CRIF Admin Panel</h1>
      <p>Manage projects and documentation without touching the database.</p>

      <hr />

      <!-- ADD PROJECT -->
      <h2>Add Project</h2>
      <input id="p-name" placeholder="Project Name" /><br /><br />
      <textarea id="p-desc" placeholder="Description"></textarea><br /><br />
      <input id="p-key" placeholder="Keywords (comma separated)" /><br /><br />
      <button onclick="addProject()">Add Project</button>

      <h2>Projects</h2>
      <div id="projects"></div>

      <hr />

      <!-- ADD DOCUMENT -->
      <h2>Add Document</h2>
      <input id="d-project" placeholder="Project Name" /><br /><br />
      <input id="d-title" placeholder="Document Title" /><br /><br />
      <textarea id="d-content" placeholder="Document Content"></textarea
      ><br /><br />
      <input id="d-key" placeholder="Keywords (comma separated)" /><br /><br />
      <button onclick="addDocument()">Add Document</button>

      <h2>Documents</h2>
      <div id="documents"></div>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
